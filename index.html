<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barcode Logger — Metis Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface2: #202020;
      --border: #2a2a2a;
      --border2: #333;
      --text: #f0ede8;
      --muted: #777;
      --hint: #444;
      --accent: #c8f060;
      --accent-dim: #8faa3a;
      --danger: #ff5f57;
      --warn: #ffbd2e;
      --ok: #c8f060;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .logo-block { display: flex; flex-direction: column; gap: 4px; }
    .logo { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
    .title { font-size: 26px; font-weight: 300; color: var(--text); letter-spacing: -0.02em; }
    .title span { color: var(--accent); font-weight: 500; }
    .conn-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 6px 14px;
      font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace;
      cursor: pointer; transition: border-color 0.2s;
    }
    .conn-pill:hover { border-color: var(--border2); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); flex-shrink: 0; transition: background 0.3s; }
    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--danger); }

    /* SETUP DRAWER */
    .setup-drawer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .setup-drawer.open { display: block; }
    .setup-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .setup-row { display: flex; gap: 8px; }
    .setup-row input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s; }
    .setup-row input:focus { border-color: var(--accent-dim); }
    .setup-row input::placeholder { color: var(--hint); }
    .btn-ghost { background: transparent; border: 1px solid var(--border2); border-radius: 8px; padding: 10px 16px; color: var(--muted); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-ghost:hover { border-color: var(--accent-dim); color: var(--accent); }
    .setup-hint { font-size: 11px; color: var(--hint); margin-top: 8px; font-family: 'DM Mono', monospace; }

    /* SCAN ZONE */
    .scan-zone {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
    }
    .scan-zone::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .scan-zone.active::before { opacity: 1; }
    .scan-input-row { display: flex; gap: 10px; margin-bottom: 12px; }
    #barcodeInput {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 24px;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      outline: none;
      letter-spacing: 0.06em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #barcodeInput:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(200, 240, 96, 0.07);
    }
    #barcodeInput::placeholder { color: var(--hint); font-size: 16px; letter-spacing: 0; }
    .btn-scan {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: #0f0f0f;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-scan:hover { background: #d4f570; transform: translateY(-1px); }
    .btn-scan:active { transform: scale(0.97); }
    #notesInput {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    #notesInput:focus { border-color: var(--border2); }
    #notesInput::placeholder { color: var(--hint); }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .stat-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-val { font-size: 28px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text); }
    .stat-val.sm { font-size: 15px; padding-top: 6px; }

    /* LOG TABLE */
    .log-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .log-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .log-toolbar-title { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
    .toolbar-actions { display: flex; gap: 8px; }
    .btn-sm {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--accent-dim); color: var(--accent); }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      font-family: 'DM Mono', monospace;
    }
    td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr.flash td { animation: rowflash 1.8s ease forwards; }
    @keyframes rowflash {
      0% { background: rgba(200, 240, 96, 0.1); }
      100% { background: transparent; }
    }
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
    }
    .badge.ok { background: rgba(200, 240, 96, 0.12); color: var(--ok); border: 1px solid rgba(200, 240, 96, 0.2); }
    .badge.fail { background: rgba(255, 95, 87, 0.1); color: var(--danger); border: 1px solid rgba(255, 95, 87, 0.2); }
    .badge.pending { background: rgba(255, 189, 46, 0.1); color: var(--warn); border: 1px solid rgba(255, 189, 46, 0.2); }
    .badge.local { background: rgba(120,120,120,0.1); color: var(--muted); border: 1px solid var(--border2); }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--hint);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.04em;
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 99;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* CAMERA */
    .camera-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }
    .camera-overlay.open { display: flex; }
    .camera-frame {
      position: relative;
      width: min(380px, 92vw);
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid var(--border2);
      background: #000;
    }
    #cameraVideo {
      width: 100%;
      display: block;
      border-radius: 14px;
    }
    .camera-scanner-line {
      position: absolute;
      left: 10%; right: 10%;
      height: 2px;
      background: var(--accent);
      animation: scanline 2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--accent);
    }
    @keyframes scanline {
      0%, 100% { top: 20%; }
      50% { top: 80%; }
    }
    .camera-corners::before, .camera-corners::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--accent);
      border-style: solid;
    }
    .camera-corners::before { top: 10px; left: 10px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .camera-corners::after { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .camera-label {
      font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em; text-align: center;
    }
    .btn-camera-close {
      background: transparent; border: 1px solid var(--border2);
      border-radius: 10px; padding: 10px 28px;
      color: var(--muted); font-size: 13px;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-camera-close:hover { border-color: var(--danger); color: var(--danger); }
    .btn-camera {
      background: transparent;
      border: 1px solid var(--accent-dim);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-camera:hover { background: rgba(200,240,96,0.07); }
    .btn-camera:active { transform: scale(0.97); }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      body { padding: 1.25rem 1rem 3rem; overflow-x: hidden; }
      .header { flex-direction: column; gap: 12px; align-items: flex-start; }
      .title { font-size: 20px; }
      .conn-pill { align-self: flex-start; }
      .scan-zone { padding: 1.25rem; }
      .scan-input-row { flex-wrap: wrap; gap: 8px; }
      #barcodeInput { font-size: 18px; min-width: 0; flex: 1 1 100%; }
      .btn-camera { flex: 1; justify-content: center; }
      .btn-scan { flex: 1; justify-content: center; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stat-val { font-size: 22px; }
      .stat-val.sm { font-size: 13px; }
      .log-toolbar { flex-direction: column; align-items: flex-start; gap: 10px; }
      .toolbar-actions { width: 100%; display: flex; gap: 8px; }
      .toolbar-actions button { flex: 1; }
      th, td { padding: 8px 10px; font-size: 12px; }
      .setup-row { flex-wrap: wrap; }
      .setup-row input { min-width: 0; flex: 1 1 100%; }
    }
  </style>
</head>
<body>

  <div style="max-width: 780px; margin: 0 auto; min-width: 0; overflow-x: hidden;">

    <div class="header">
      <div class="logo-block">
        <span class="logo">Metis Foundation</span>
        <h1 class="title">Barcode <span>Logger</span></h1>
      </div>
      <div class="conn-pill" onclick="toggleSetup()" title="Configure Sheets connection">
        <span class="dot" id="connDot"></span>
        <span id="connLabel">Configure</span>
      </div>
    </div>

    <div class="setup-drawer" id="setupDrawer">
      <div class="setup-label">Google Apps Script Web App URL</div>
      <div class="setup-row">
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec" />
        <button class="btn-ghost" onclick="testConn()">Test</button>
        <button class="btn-ghost" onclick="saveUrl()">Save</button>
      </div>
      <div class="setup-hint">Leave blank to log locally only. Export CSV anytime.</div>
    </div>

    <div class="scan-zone" id="scanZone">
      <div class="scan-input-row">
        <input type="text" id="barcodeInput" placeholder="Scan or type barcode..." autocomplete="off" spellcheck="false" />
        <button class="btn-camera" onclick="openCamera()" title="Scan with camera">&#128247;</button>
        <button class="btn-scan" onclick="submitScan()">Log Scan</button>
      </div>
      <input type="text" id="notesInput" placeholder="Notes (optional)" />
    </div>

    <!-- CAMERA OVERLAY -->
    <div class="camera-overlay" id="cameraOverlay">
      <div class="camera-label" id="cameraStatus">Point camera at barcode</div>
      <div class="camera-frame">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <div class="camera-scanner-line"></div>
        <div class="camera-corners"></div>
      </div>
      <button class="btn-camera-close" onclick="closeCamera()">Cancel</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total scans</div>
        <div class="stat-val" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg time (s)</div>
        <div class="stat-val" id="statAvg">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last barcode</div>
        <div class="stat-val sm" id="statLast">--</div>
      </div>
    </div>

    <div class="log-wrap">
      <div class="log-toolbar">
        <span class="log-toolbar-title">Session log</span>
        <div class="toolbar-actions">
          <button class="btn-sm" onclick="exportCSV()">Export CSV</button>
          <button class="btn-sm" onclick="clearLog()">Clear</button>
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Time</th>
              <th>Barcode</th>
              <th>Scan time (s)</th>
              <th>Notes</th>
              <th>Sheets</th>
            </tr>
          </thead>
          <tbody id="logBody">
            <tr>
              <td colspan="6">
                <div class="empty-state">
                  <div class="empty-icon">⌗</div>
                  No scans yet — focus is on the barcode field
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script>
    let log = [], scanCount = 0, lastScanTime = null, scanTimes = [];
    const barcodeInput = document.getElementById('barcodeInput');
    const logBody = document.getElementById('logBody');
    const scanZone = document.getElementById('scanZone');

    // Auto-focus barcode input on any keypress outside inputs
    barcodeInput.focus();
    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      barcodeInput.focus();
    });

    barcodeInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitScan(); });
    barcodeInput.addEventListener('focus', () => scanZone.classList.add('active'));
    barcodeInput.addEventListener('blur', () => scanZone.classList.remove('active'));

    // Load saved URL
    const savedUrl = localStorage.getItem('barcodeLoggerUrl') || '';
    if (savedUrl) {
      document.getElementById('scriptUrl').value = savedUrl;
      setConnStatus('ready', 'Sheets configured');
    }

    function toggleSetup() {
      const d = document.getElementById('setupDrawer');
      d.classList.toggle('open');
    }

    function saveUrl() {
      const url = document.getElementById('scriptUrl').value.trim();
      localStorage.setItem('barcodeLoggerUrl', url);
      showToast('URL saved');
      document.getElementById('setupDrawer').classList.remove('open');
      if (url) setConnStatus('ready', 'Sheets configured');
      else setConnStatus('none', 'Local only');
    }

    function testConn() {
      const url = document.getElementById('scriptUrl').value.trim();
      if (!url) { showToast('Paste a URL first'); return; }
      setConnStatus('pending', 'Testing...');
      fetch(url + '?test=1', { mode: 'no-cors' })
        .then(() => { setConnStatus('ok', 'Connected'); showToast('Connection OK'); })
        .catch(() => { setConnStatus('err', 'Failed'); showToast('Could not reach URL'); });
    }

    function setConnStatus(state, label) {
      const dot = document.getElementById('connDot');
      const lbl = document.getElementById('connLabel');
      dot.className = 'dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
      lbl.textContent = label;
    }

    function fmt(d) { return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
    function fmtFull(d) { return d.toLocaleDateString() + ' ' + fmt(d); }

    function submitScan() {
      const val = barcodeInput.value.trim();
      if (!val) return;

      const ts = new Date();
      let elapsed = null;
      if (lastScanTime) {
        elapsed = ((ts - lastScanTime) / 1000).toFixed(2);
        scanTimes.push(parseFloat(elapsed));
      }
      lastScanTime = ts;
      scanCount++;

      const notes = document.getElementById('notesInput').value.trim();
      const entry = { id: scanCount, ts, barcode: val, elapsed, notes, status: 'pending' };
      log.unshift(entry);

      barcodeInput.value = '';
      barcodeInput.focus();
      updateTable();
      updateStats();

      const url = (document.getElementById('scriptUrl').value || localStorage.getItem('barcodeLoggerUrl') || '').trim();
      if (url) {
        sendToSheets(entry, url);
      } else {
        entry.status = 'local';
        updateTable();
      }
    }

    async function sendToSheets(entry, url) {
      try {
        await fetch(url, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            timestamp: fmtFull(entry.ts),
            barcode: entry.barcode,
            scan_time_s: entry.elapsed !== null ? entry.elapsed : '',
            notes: entry.notes
          })
        });
        entry.status = 'ok';
        showToast('Logged to Sheets');
      } catch (e) {
        entry.status = 'fail';
        showToast('Sheets error — saved locally');
      }
      updateTable();
    }

    function updateTable() {
      if (!log.length) {
        logBody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">⌗</div>No scans yet — focus is on the barcode field</div></td></tr>';
        return;
      }
      logBody.innerHTML = log.map((e, i) => {
        const badge =
          e.status === 'ok'      ? '<span class="badge ok">Sent</span>' :
          e.status === 'fail'    ? '<span class="badge fail">Error</span>' :
          e.status === 'local'   ? '<span class="badge local">Local</span>' :
                                   '<span class="badge pending">Sending</span>';
        const flash = i === 0 ? 'class="flash"' : '';
        return `<tr ${flash}>
          <td style="color:var(--muted)">${e.id}</td>
          <td style="color:var(--muted)">${fmt(e.ts)}</td>
          <td style="letter-spacing:0.1em">${e.barcode}</td>
          <td>${e.elapsed !== null ? e.elapsed : '<span style="color:var(--hint)">--</span>'}</td>
          <td style="font-family:\'DM Sans\',sans-serif;font-size:13px;color:var(--muted)">${e.notes || ''}</td>
          <td>${badge}</td>
        </tr>`;
      }).join('');
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = scanCount;
      if (scanTimes.length) {
        const avg = scanTimes.reduce((a, b) => a + b, 0) / scanTimes.length;
        document.getElementById('statAvg').textContent = avg.toFixed(1);
      }
      if (log.length) {
        const b = log[0].barcode;
        document.getElementById('statLast').textContent = b.length > 14 ? b.slice(0, 14) + '…' : b;
      }
    }

    function clearLog() {
      if (!log.length) return;
      log = []; scanCount = 0; scanTimes = []; lastScanTime = null;
      document.getElementById('statTotal').textContent = '0';
      document.getElementById('statAvg').textContent = '--';
      document.getElementById('statLast').textContent = '--';
      updateTable();
      showToast('Log cleared');
    }

    function exportCSV() {
      if (!log.length) { showToast('Nothing to export'); return; }
      const rows = [['#', 'Timestamp', 'Barcode', 'Scan Time (s)', 'Notes', 'Sheets Status']];
      [...log].reverse().forEach(e => rows.push([
        e.id, fmtFull(e.ts), e.barcode,
        e.elapsed !== null ? e.elapsed : '',
        e.notes, e.status
      ]));
      const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
      a.download = 'scan_log_' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
      showToast('CSV downloaded');
    }

    // CAMERA SCANNING
    let codeReader = null;
    let cameraStream = null;

    async function openCamera() {
      const overlay = document.getElementById('cameraOverlay');
      const video = document.getElementById('cameraVideo');
      const status = document.getElementById('cameraStatus');

      overlay.classList.add('open');
      status.textContent = 'Starting camera...';

      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = cameraStream;
        status.textContent = 'Point camera at barcode';

        if (typeof ZXing === 'undefined') {
          status.textContent = 'Scanner library not loaded. Check internet connection.';
          return;
        }

        codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoElement(video, (result, err) => {
          if (result) {
            const val = result.getText();
            closeCamera();
            document.getElementById('barcodeInput').value = val;
            submitScan();
            showToast('Camera scan: ' + val);
          }
        });
      } catch(err) {
        if (err.name === 'NotAllowedError') {
          status.textContent = 'Camera permission denied. Please allow camera access.';
        } else {
          status.textContent = 'Camera error: ' + err.message;
        }
      }
    }

    function closeCamera() {
      const overlay = document.getElementById('cameraOverlay');
      overlay.classList.remove('open');
      if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      const video = document.getElementById('cameraVideo');
      video.srcObject = null;
    }

    // Close camera on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('cameraOverlay').classList.contains('open')) {
        closeCamera();
      }
    });

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
